# ============================================================
# AquilaLM 数据清洗流水线 — 全局配置
# 所有阈值集中管理，调参只需改这个文件
# ============================================================

# 路径配置
paths:
  input: "data/c4_zh_5k.jsonl"           # C4 中文网页语料（3679条，含真实噪声）
  output_dir: "data"                     # 中间产物输出目录
  log_dir: "logs"                        # 日志目录

# ============================================================
# 1. 规则过滤
# ============================================================
rule_filter:
  enabled: true
  min_text_length: 10                    # 最短字符数（低于此值丢弃）
  max_text_length: 10000                 # 最长字符数（超过此值丢弃）
  max_non_chinese_ratio: 0.55            # 非中文字符最大占比（C4网页语料含URL/英文，需宽松）
  max_repeat_char_ratio: 0.40            # 单字最大重复占比（防"哈哈哈哈哈..."）
  max_url_count: 20                      # URL 最大出现次数（网页语料天然含链接）
  min_effective_ratio: 0.50              # 最小有效字符比（去空格/标点后）
  output: "data/passed_rules.jsonl"      # 规则过滤后输出

# ============================================================
# 2. N-gram PPL 困惑度
# ============================================================
ngram_ppl:
  enabled: true
  n: 3                                   # n-gram 阶数（bigram=2, trigram=3）
  tokenizer: "jieba"                     # 分词方式：jieba | char（按字）
  ppl_threshold: 30                     # PPL 超过此值的丢弃（网页语料最终推荐值）
  min_train_samples: 1000                # N-gram 模型最少训练样本数
  output: "data/scored.jsonl"            # PPL 打分后输出（保留全部，带 ppl 字段）

# ============================================================
# 3. MinHash + LSH 去重
# ============================================================
dedup:
  enabled: true
  jaccard_threshold: 0.60                # Jaccard 相似度阈值（网页语料最终推荐值）
  num_perm: 128                          # MinHash 签名长度
  ngram_size: 3                          # 用于 MinHash 的 n-gram 大小
  lsh_weights: [0.5, 0.5]               # LSH 误报/漏报权重（必须和为1.0，0.5/0.5=平衡）
  output: "data/cleaned.jsonl"           # 最终产出（去重后）

# ============================================================
# 4. 指令合成（阶段2）
# ============================================================
instruction_synth:
  enabled: true
  api_base: "https://api.deepseek.com"       # DeepSeek API 地址
  flash_model: "deepseek-chat"               # v4flash 模型名（批量生成）
  pro_model: "deepseek-reasoner"             # v4pro 模型名（复杂进化）
  max_retries: 3                              # API 调用失败重试次数
  temperature_creative: 0.8                   # 生成温度（高=多样）
  temperature_precise: 0.3                    # 进化/偏好构造温度（低=稳定）
  # 种子筛选
  seed_min_length: 100
  seed_max_length: 500
  seed_max_ppl: 15.0
  seed_min_cn_ratio: 0.5
  max_seeds: 80                               # 最多选取种子数
  # Self-Instruct
  si_generations_per_seed: 5                  # 每条种子生成的指令数
  si_task_types: ["推理分析", "知识问答", "文本生成", "代码编写", "多轮对话"]
  # Evol-Instruct
  ei_max_evolve: 150                          # 最多进化多少条
  ei_evolution_types: ["增加约束", "深化推理", "拆解子任务", "多轮对话", "代码加解释"]
  # DPO 偏好构造
  dpo_code_pairs: 20                          # 代码执行正确性构造的偏好对数
  dpo_math_pairs: 20                          # 数学答案验证构造的偏好对数
  dpo_exec_timeout: 5                         # 代码执行超时（秒）
  # 后过滤
  postfilter_min_instruction_len: 10
  postfilter_min_output_len: 30
  postfilter_jaccard_threshold: 0.7           # 指令间去重阈值
  postfilter_consistency_threshold: 0.7       # 一致性最低分数
  # 输出
  output: "data/synthesized.jsonl"            # 合成指令数据
  dpo_output: "data/dpo_pairs.jsonl"          # DPO 偏好对
  consistency_sample: 30                      # 一致性抽检数量

# ============================================================
# 3. 三维质量评估（阶段3）
# ============================================================
quality_eval:
  enabled: true
  input: "data/synthesized.jsonl"            # 输入：阶段2合成指令
  output: "data/scored.jsonl"                # 输出：含三维评分的指令数据
  # PPL 流畅度
  ppl_n: 3                                    # N-gram 阶数
  ppl_tokenizer: "jieba"                      # 分词方式
  # IFD 指令难度
  ifd_model_name: "uer/gpt2-chinese-cluecorpussmall"  # 中文 GPT-2（CPU可跑）
  ifd_batch_size: 4                           # 推理 batch size
  ifd_max_length: 512                          # 最大 token 长度
  # Embedding 多样性
  embed_model_name: "paraphrase-multilingual-MiniLM-L12-v2"  # 多语言 sentence encoder
  embed_batch_size: 32                        # 编码 batch size
  # 设备
  device: "auto"                               # auto | cuda | cpu

# ============================================================
# 4. 课程学习排序器（阶段4）
# ============================================================
curriculum:
  enabled: true
  input: "data/scored.jsonl"                 # 输入：阶段3含IFD评分的数据
  output_band: "data/curriculum_band.jsonl"  # 策略A输出：分带混洗
  output_beta: "data/curriculum_beta.jsonl"  # 策略B输出：β退火加权
  # 质量过滤
  ppl_max: 5.0                               # PPL 超过此值不进课程学习
  ifd_missing_strategy: "median"             # IFD缺失处理: drop | mean | median
  # 策略A: 分带混洗
  band_count: 3                              # 难度带数
  band_boundaries: null                       # null = 自动等分位数切割
  band_shuffle: true
  # 策略B: β退火
  beta_start: 1.0                            # 初始 β（倾向简单样本）
  beta_end: 0.1                              # 终止 β（接近均匀采样）
  beta_steps: 5                              # 退火步数
  sampling_epochs: 3                         # 完整遍历次数
  temperature: 0.5                           # 采样温度

# ============================================================
# 全局
# ============================================================
global:
  random_seed: 42
  log_level: "INFO"                      # DEBUG | INFO | WARNING
